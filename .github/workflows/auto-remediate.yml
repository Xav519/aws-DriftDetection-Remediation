###############################################################################
# auto-remediate.yml
# Triggered when a drift issue is labeled "auto-remediate" OR manually.
# Requires human approval (GitHub Environment) before applying.
###############################################################################
name: Auto Remediate Drift

on:
  issues:
    # workflow starts when issue is created ✔ OR when label is added ✔ --> ignore events that are NOT auto-remediate labels
    # with guards --  Note: we rely on guard logic to filter.
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      dry_run:
        description: "Dry run (plan only, no apply)"
        required: false
        default: "false"          # FIX: was "true" — apply never ran by default

permissions:
  contents: read
  id-token: write
  issues: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ###########################################################################
  # Guard: only proceed if the label "auto-remediate" was just added,
  #        OR this is a manual workflow_dispatch.
  ###########################################################################
  guard:
    name: Check trigger conditions
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      environment: ${{ steps.check.outputs.environment }}

    steps:
      - name: Check trigger
        id: check
        run: |
          # ── Manual trigger ───────────────────────────────────────────────
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ── Get issue labels (state-based, reliable) ─────────────────────
          LABELS=$(echo '${{ toJson(github.event.issue.labels) }}' | jq -r '.[].name')

          # ── Only run if auto-remediate label exists ──────────────────────
          if echo "$LABELS" | grep -q "auto-remediate"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

          # ── Derive environment (ONLY if running) ─────────────────────────
          if echo "$LABELS" | grep -q "^prod$"; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "^staging$"; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  ###########################################################################
  # Job: Human approval gate + Terraform apply
  ###########################################################################
  remediate:
    name: Apply Remediation
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # GitHub Environment with required reviewers — this is the approval gate.
    # Settings > Environments > "remediation" > add required reviewers.
    environment:
      name: remediation
      url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    env:
      ENVIRONMENT: ${{ needs.guard.outputs.environment }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Lambda zip ──────────────────────────────────────────────────
      - name: Build Lambda zip
        run: zip -r lambda_payload.zip lambda/

      # ── AWS Auth (OIDC) ───────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: remediation-${{ github.run_id }}

      # ── Terraform setup ───────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # ── Init ──────────────────────────────────────────────────────────────
      - name: Terraform Init
        working-directory: rootTerraformCode
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -no-color

      # ── Plan ──────────────────────────────────────────────────────────────
      # FIX: capture exit code properly so a "no changes" plan (exit 0) and
      #      a "changes needed" plan (exit 2) both proceed; only exit 1 fails.
      - name: Terraform Plan (pre-apply confirmation)
        id: plan
        working-directory: rootTerraformCode
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -out=remediate.tfplan \
            -no-color \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL || '' }}" \
            2>&1 | tee remediate_plan.txt
          PLAN_EXIT=$?
          set -e

          echo "plan_exit_code=$PLAN_EXIT" >> $GITHUB_OUTPUT

          echo "## Remediation Plan" >> $GITHUB_STEP_SUMMARY
          cat remediate_plan.txt    >> $GITHUB_STEP_SUMMARY

          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed — see output above."
            exit 1
          fi
          # Exit 0 = already clean, exit 2 = changes to apply — both are fine here.

      # ── Decide apply vs dry-run ───────────────────────────────────────────
      - name: Decide if apply should run
        id: decision
        run: |
          # workflow_dispatch: respect the dry_run input
          # issues trigger: dry_run input is empty → default to applying
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            echo "apply=false" >> $GITHUB_OUTPUT
            echo "Dry-run mode — skipping apply."
          else
            echo "apply=true" >> $GITHUB_OUTPUT
          fi

      # ── Apply ─────────────────────────────────────────────────────────────
      - name: Terraform Apply
        if: steps.decision.outputs.apply == 'true' && steps.plan.outputs.plan_exit_code == '2'
        id: apply
        working-directory: rootTerraformCode
        run: |
          set +e
          terraform apply \
            -auto-approve \
            -no-color \
            remediate.tfplan \
            2>&1 | tee apply_output.txt
          APPLY_EXIT=$?
          set -e

          echo "apply_exit_code=$APPLY_EXIT" >> $GITHUB_OUTPUT

          echo "## Apply Output" >> $GITHUB_STEP_SUMMARY
          cat apply_output.txt  >> $GITHUB_STEP_SUMMARY

          exit $APPLY_EXIT

      # ── No-op notice when infra is already clean ──────────────────────────
      - name: Already clean — no apply needed
        if: steps.plan.outputs.plan_exit_code == '0'
        run: echo "Infrastructure is already in the desired state. Nothing to apply." >> $GITHUB_STEP_SUMMARY

      # ── Record remediation event in DynamoDB via Lambda ───────────────────
      # FIX: gate on steps.apply.conclusion, not the raw exit-code output,
      #      so this step is skipped safely when apply didn't run at all.
      - name: Record remediation in DynamoDB
        if: steps.apply.conclusion == 'success'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          aws lambda invoke \
            --function-name "drift-detection-${{ env.ENVIRONMENT }}-drift-parser" \
            --payload "{\"source\": \"remediation\", \"action\": \"remediation_complete\", \"environment\": \"${{ env.ENVIRONMENT }}\", \"run_id\": \"$GITHUB_RUN_ID\", \"remediated_at\": \"$TIMESTAMP\"}" \
            --cli-binary-format raw-in-base64-out \
            --region ${{ env.AWS_REGION }} \
            /dev/null

      # ── Close issue ───────────────────────────────────────────────────────
      - name: Close drift issue
        if: github.event_name == 'issues' && steps.apply.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Drift remediated successfully.**\n\nTerraform apply completed at ${new Date().toISOString()}\nRun: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['drift', 'remediated', '${{ env.ENVIRONMENT }}']
            });

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload remediation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remediation-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: |
            rootTerraformCode/remediate_plan.txt
            rootTerraformCode/apply_output.txt
          retention-days: 90
