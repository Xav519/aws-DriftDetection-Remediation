###############################################################################
# auto-remediate.yml
# Triggered when a drift issue is labeled "auto-remediate" OR manually.
# Requires human approval (GitHub Environment) before applying.
# This gate is intentional — auto-applying deletes without review = outages.
###############################################################################
name: Auto Remediate Drift

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      dry_run:
        description: "Dry run (plan only, no apply)"
        required: false
        default: "true"

permissions:
  contents: read
  id-token: write
  issues: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ###########################################################################
  # Guard: only proceed if label is "auto-remediate" on a drift issue
  ###########################################################################
  guard:
    name: Check trigger conditions
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      environment: ${{ steps.check.outputs.environment }}
    steps:
      - name: Check trigger
        id: check
        run: |
          if [ "${{ github.event_name }}" == "issues" ]; then
            LABEL="${{ github.event.label.name }}"
            ISSUE_LABELS='${{ toJson(github.event.issue.labels.*.name) }}'

            if [ "$LABEL" != "auto-remediate" ]; then
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Extract environment from issue labels
            if echo "$ISSUE_LABELS" | grep -q '"prod"'; then
              ENV="prod"
            elif echo "$ISSUE_LABELS" | grep -q '"staging"'; then
              ENV="staging"
            else
              ENV="dev"
            fi

            echo "should_run=true"  >> $GITHUB_OUTPUT
            echo "environment=$ENV" >> $GITHUB_OUTPUT
          else
            echo "should_run=true"  >> $GITHUB_OUTPUT
            echo "environment=${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_OUTPUT
          fi

  ###########################################################################
  # Job: Human approval gate + Terraform apply
  ###########################################################################
  remediate:
    name: Apply Remediation
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GitHub Environment with required reviewers — this is the approval gate.
    # Go to: Settings > Environments > create "remediation" environment
    # Add yourself (or your team) as a required reviewer.
    environment:
      name: remediation
      url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    env:
      ENVIRONMENT: ${{ needs.guard.outputs.environment }}

    steps:
      # -----------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Build Lambda zip from source so filebase64sha256 resolves correctly
      # -----------------------------------------------------------------
      - name: Build Lambda zip
        run: zip -r lambda_payload.zip lambda/

      # -----------------------------------------------------------------
      # AWS Auth (OIDC)
      # -----------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: remediation-${{ github.run_id }}

      # -----------------------------------------------------------------
      # Terraform setup
      # -----------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # -----------------------------------------------------------------
      # Init
      # -----------------------------------------------------------------
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -no-color
        working-directory: rootTerraformCode

      # -----------------------------------------------------------------
      # Plan — always runs so the reviewer sees what will change
      # -----------------------------------------------------------------
      - name: Terraform Plan (pre-apply confirmation)
        run: |
          terraform plan \
            -out=remediate.tfplan \
            -no-color \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL || '' }}" \
            2>&1 | tee remediate_plan.txt
          echo "## Remediation Plan" >> $GITHUB_STEP_SUMMARY
          cat remediate_plan.txt >> $GITHUB_STEP_SUMMARY
        working-directory: rootTerraformCode

      # -----------------------------------------------------------------
      # Apply — skipped if dry_run=true (default)
      # -----------------------------------------------------------------
      - name: Decide if apply should run
        id: decision
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "apply=false" >> $GITHUB_OUTPUT
          else
            echo "apply=true" >> $GITHUB_OUTPUT
          fi
      - name: Terraform Apply
        if: steps.decision.outputs.apply == 'true'
        id: apply
        run: |
          set +e
          terraform apply \
            -auto-approve \
            -no-color \
            remediate.tfplan \
            2>&1 | tee apply_output.txt
          APPLY_EXIT=$?
          echo "apply_exit_code=$APPLY_EXIT" >> $GITHUB_OUTPUT
          exit $APPLY_EXIT
        working-directory: rootTerraformCode

      # -----------------------------------------------------------------
      # Record remediation event in DynamoDB via Lambda
      # Raw JSON payload — no base64 encoding
      # -----------------------------------------------------------------
      - name: Record remediation in DynamoDB
        if: steps.apply.outputs.apply_exit_code == '0'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          aws lambda invoke \
            --function-name "drift-detection-${{ env.ENVIRONMENT }}-drift-parser" \
            --payload "{\"source\": \"remediation\", \"action\": \"remediation_complete\", \"environment\": \"${{ env.ENVIRONMENT }}\", \"run_id\": \"$GITHUB_RUN_ID\", \"remediated_at\": \"$TIMESTAMP\"}" \
            --cli-binary-format raw-in-base64-out \
            --region ${{ env.AWS_REGION }} \
            /dev/null

      # -----------------------------------------------------------------
      # Close the drift issue and leave an audit comment
      # -----------------------------------------------------------------
      - name: Close drift issue
        if: github.event_name == 'issues' && steps.apply.outputs.apply_exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Drift remediated successfully.**\n\nTerraform apply completed at ${new Date().toISOString()}\nRun: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['drift', 'remediated', '${{ env.ENVIRONMENT }}']
            });

      # -----------------------------------------------------------------
      # Upload plan + apply output as artifacts (90-day retention)
      # -----------------------------------------------------------------
      - name: Upload remediation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remediation-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: |
            rootTerraformCode/remediate_plan.txt
            rootTerraformCode/apply_output.txt
          retention-days: 90
