###############################################################################
# drift-detection.yml
# Detects Terraform drift and opens a GitHub issue for critical findings.
# Chain: detect → open-issue (if no open drift issue exists) → label triggers
#        auto-remediate.yml automatically via on: issues: types: [labeled]
###############################################################################
name: Drift Detection

on:
  schedule:
    - cron: "0 */6 * * *"    # Every 6 hours — the heartbeat of the system
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

env:
  TF_VERSION:   "1.7.5"
  AWS_REGION:   "us-east-1"
  ENVIRONMENT:  ${{ github.event.inputs.environment || 'dev' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ###########################################################################
  # Ensure all required labels exist before anything tries to use them.
  # GitHub throws 422 UnprocessableEntity if you assign a non-existent label.
  ###########################################################################
  bootstrap-labels:
    name: Ensure GitHub labels exist
    runs-on: ubuntu-latest
    steps:
      - name: Create labels if missing
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'drift',           color: 'e4e669', description: 'Infrastructure drift detected' },
              { name: 'critical',        color: 'd73a4a', description: 'Critical severity drift' },
              { name: 'auto-remediate',  color: '0075ca', description: 'Triggers auto-remediation workflow' },
              { name: 'remediated',      color: '0e8a16', description: 'Drift has been remediated' },
              { name: 'dev',             color: 'bfd4f2', description: 'Development environment' },
              { name: 'staging',         color: 'c5def5', description: 'Staging environment' },
              { name: 'prod',            color: 'f9d0c4', description: 'Production environment' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
                console.log(`Created label: ${label.name}`);
              } catch (e) {
                // 422 = label already exists — that's fine, keep going
                if (e.status !== 422) throw e;
              }
            }

  ###########################################################################
  # Detect drift via Terraform plan
  ###########################################################################
  detect:
    name: Detect Drift
    needs: bootstrap-labels
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      drift_detected: ${{ steps.plan.outputs.drift_detected }}
      plan_exit_code: ${{ steps.plan.outputs.plan_exit_code }}
      critical_count: ${{ steps.parse.outputs.critical_count }}
      drift_summary:  ${{ steps.parse.outputs.drift_summary }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lambda zip
        run: zip -r lambda_payload.zip lambda/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: rootTerraformCode
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -no-color

      - name: Terraform Validate
        working-directory: rootTerraformCode
        run: terraform validate -no-color

      - name: Terraform Plan (drift detection)
        id: plan
        working-directory: rootTerraformCode
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -out=tfplan \
            -no-color \
            -refresh=true \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL || '' }}" \
            > plan_output.txt 2>&1
          PLAN_EXIT_CODE=$?
          set -e

          echo "plan_exit_code=$PLAN_EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $PLAN_EXIT_CODE -eq 1 ]; then
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "::error::Terraform plan failed — see output below."
            cat plan_output.txt
            exit 1
          elif [ $PLAN_EXIT_CODE -eq 2 ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Show Terraform plan output
        if: always()
        working-directory: rootTerraformCode
        run: |
          echo "===== plan_output.txt ====="
          cat plan_output.txt || echo "(file not found)"

      - name: Export plan JSON
        if: steps.plan.outputs.plan_exit_code == '2'
        working-directory: rootTerraformCode
        run: terraform show -json tfplan > tfplan.json

      - name: Parse drift and invoke Lambda
        id: parse
        if: steps.plan.outputs.plan_exit_code == '2'
        working-directory: rootTerraformCode
        run: |
          S3_KEY="drift-plans/${{ env.ENVIRONMENT }}/$GITHUB_RUN_ID/tfplan.json"
          aws s3 cp tfplan.json "s3://${{ secrets.TF_STATE_BUCKET }}/$S3_KEY" \
            --region ${{ env.AWS_REGION }}

          aws lambda invoke \
            --function-name "drift-detection-${{ env.ENVIRONMENT }}-drift-parser" \
            --payload "{\"s3_bucket\": \"${{ secrets.TF_STATE_BUCKET }}\", \"s3_key\": \"$S3_KEY\", \"source\": \"github-actions\", \"run_id\": \"$GITHUB_RUN_ID\"}" \
            --cli-binary-format raw-in-base64-out \
            --region ${{ env.AWS_REGION }} \
            response.json

          cat response.json

          DRIFT_COUNT=$(jq '.drift_count // 0'    response.json)
          CRITICAL_COUNT=$(jq '.critical_count // 0' response.json)

          echo "drift_count=$DRIFT_COUNT"       >> $GITHUB_OUTPUT
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "drift_summary=Drift: $DRIFT_COUNT resources, $CRITICAL_COUNT critical" >> $GITHUB_OUTPUT

          echo "## Drift Detection Results"          >> $GITHUB_STEP_SUMMARY
          echo "| Drift | Critical |"                >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|"                >> $GITHUB_STEP_SUMMARY
          echo "| $DRIFT_COUNT | $CRITICAL_COUNT |" >> $GITHUB_STEP_SUMMARY

      - name: No drift summary
        if: steps.plan.outputs.plan_exit_code == '0'
        run: echo "## ✅ No Drift Detected" >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-plan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: |
            rootTerraformCode/plan_output.txt
            rootTerraformCode/tfplan.json
          retention-days: 30

  ###########################################################################
  # Open GitHub issue on drift — with duplicate guard.
  # If an open drift issue already exists for this environment, skip creating
  # a new one. This prevents the 6h schedule from spamming issues and
  # triggering repeated remediation runs before the first one completes.
  ###########################################################################
  open-issue:
    name: Open Drift Issue
    needs: detect
    runs-on: ubuntu-latest
    if: needs.detect.outputs.drift_detected == 'true'

    steps:
      - name: Check for existing open drift issue
        id: check-existing
        uses: actions/github-script@v7
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        with:
          script: |
            const env = process.env.ENVIRONMENT;

            // Search for any open issue labelled both 'drift' and the env name.
            // If one already exists, skip creating a duplicate.
            const { data: issues } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              state:  'open',
              labels: `drift,${env}`,
            });

            if (issues.length > 0) {
              console.log(`Open drift issue already exists for ${env}: #${issues[0].number} — skipping.`);
              core.setOutput('skip', 'true');
              core.setOutput('existing_issue', issues[0].number.toString());
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Comment on existing issue instead of opening duplicate
        if: steps.check-existing.outputs.skip == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt('${{ steps.check-existing.outputs.existing_issue }}'),
              body: [
                `🔄 **Drift still present** as of ${new Date().toISOString()}`,
                '',
                `**Summary:** ${{ needs.detect.outputs.drift_summary }}`,
                `**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              ].join('\n'),
            });

      - name: Create new drift issue
        id: create_issue
        if: steps.check-existing.outputs.skip == 'false'
        uses: actions/github-script@v7
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        with:
          script: |
            const env           = process.env.ENVIRONMENT;
            const criticalCount = parseInt('${{ needs.detect.outputs.critical_count }}' || '0');
            const emoji         = criticalCount > 0 ? '🚨 CRITICAL' : '⚠️ DRIFT DETECTED';
            const title         = `${emoji} - ${env}`;

            const issue = await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title,
              body: [
                `Infrastructure drift detected in **${env}**.`,
                '',
                `**Summary:** ${{ needs.detect.outputs.drift_summary }}`,
                '',
                `**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
                '',
                '---',
                '_This issue was opened automatically. The `auto-remediate` label below',
                'will trigger the remediation workflow momentarily._',
              ].join('\n'),
              labels: ['drift', env],
            });
            core.setOutput("issue_number", issue.data.number);

            console.log(`Opened issue #${issue.data.number}: ${title}`);

      - name: Wait before triggering remediation
        if: steps.check-existing.outputs.skip == 'false'
        run: sleep 5

      - name: Add auto-remediate label (trigger)
        if: steps.check-existing.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create_issue.outputs.issue_number }},
              labels: ['auto-remediate']
            });
