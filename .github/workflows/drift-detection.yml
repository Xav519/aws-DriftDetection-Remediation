name: Drift Detection
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect:
    name: Detect Drift
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      drift_detected: ${{ steps.plan.outputs.drift_detected }}
      critical_count: ${{ steps.parse.outputs.critical_count }}
      drift_summary: ${{ steps.parse.outputs.drift_summary }}
    steps:
      # -----------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # AWS Auth (OIDC)
      # -----------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------
      # Terraform setup
      # -----------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # -----------------------------------------------------------------
      # Init
      # -----------------------------------------------------------------
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -no-color
        working-directory: rootTerraformCode

      # -----------------------------------------------------------------
      # Validate
      # -----------------------------------------------------------------
      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: rootTerraformCode

      # -----------------------------------------------------------------
      # Plan (drift detection)
      # -----------------------------------------------------------------
      - name: Terraform Plan (drift detection)
        id: plan
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -out=tfplan \
            -no-color \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL || '' }}" \
            > plan_output.txt 2>&1
          PLAN_EXIT_CODE=$?
          set -e

          echo "plan_exit_code=$PLAN_EXIT_CODE" >> $GITHUB_OUTPUT

          # Exit code semantics:
          # 0 = no changes (clean state)
          # 1 = terraform error
          # 2 = drift detected (changes present)
          if [ $PLAN_EXIT_CODE -eq 1 ]; then
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "Terraform plan failed — see plan output below"
            exit 1
          elif [ $PLAN_EXIT_CODE -eq 2 ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi
        working-directory: rootTerraformCode

      # -----------------------------------------------------------------
      # Always print plan output so errors are visible in the logs
      # -----------------------------------------------------------------
      - name: Show Terraform plan output
        if: always()
        run: |
          echo "===== plan_output.txt ====="
          cat plan_output.txt || echo "(file not found)"
        working-directory: rootTerraformCode

      # -----------------------------------------------------------------
      # Export tfplan as JSON (only if drift detected)
      # -----------------------------------------------------------------
      - name: Export plan JSON
        if: steps.plan.outputs.plan_exit_code == '2'
        run: terraform show -json tfplan > tfplan.json
        working-directory: rootTerraformCode

      # -----------------------------------------------------------------
      # Invoke Lambda drift parser
      # -----------------------------------------------------------------
      - name: Parse drift and invoke Lambda
        id: parse
        if: steps.plan.outputs.plan_exit_code == '2'
        run: |
          # Upload plan to S3 — avoids OS arg length limit for large plans
          S3_KEY="drift-plans/${{ env.ENVIRONMENT }}/$GITHUB_RUN_ID/tfplan.json"
          aws s3 cp tfplan.json "s3://${{ secrets.TF_STATE_BUCKET }}/$S3_KEY" --region ${{ env.AWS_REGION }}

          aws lambda invoke \
            --function-name "drift-detection-${{ env.ENVIRONMENT }}-drift-parser" \
            --payload "{\"s3_bucket\": \"${{ secrets.TF_STATE_BUCKET }}\", \"s3_key\": \"$S3_KEY\", \"source\": \"github-actions\", \"run_id\": \"$GITHUB_RUN_ID\"}" \
            --cli-binary-format raw-in-base64-out \
            --region ${{ env.AWS_REGION }} \
            response.json

          cat response.json

          DRIFT_COUNT=$(jq '.drift_count // 0' response.json)
          CRITICAL_COUNT=$(jq '.critical_count // 0' response.json)
          echo "drift_count=$DRIFT_COUNT"       >> $GITHUB_OUTPUT
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "drift_summary=Drift: $DRIFT_COUNT resources, $CRITICAL_COUNT critical" >> $GITHUB_OUTPUT
          echo "## Drift Detection Results"  >> $GITHUB_STEP_SUMMARY
          echo "| Drift | Critical |"        >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|"        >> $GITHUB_STEP_SUMMARY
          echo "| $DRIFT_COUNT | $CRITICAL_COUNT |" >> $GITHUB_STEP_SUMMARY
        working-directory: rootTerraformCode

      # -----------------------------------------------------------------
      # Clean state summary
      # -----------------------------------------------------------------
      - name: No drift summary
        if: steps.plan.outputs.plan_exit_code == '0'
        run: |
          echo "## No Drift Detected ✅" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------
  # Open GitHub issue on critical drift
  # -------------------------------------------------------------------
  open-issue:
    name: Open Critical Drift Issue
    needs: detect
    runs-on: ubuntu-latest
    if: needs.detect.outputs.critical_count != '0' && needs.detect.outputs.critical_count != ''
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 CRITICAL DRIFT - ${process.env.ENVIRONMENT}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Critical infrastructure drift detected in **${process.env.ENVIRONMENT}**.\n\nSummary: ${{ needs.detect.outputs.drift_summary }}`,
              labels: ['drift', 'critical']
            });
